<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PELS widget harness</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        background: #0b0e12;
        color: #edf1f4;
        display: flex;
        flex-wrap: wrap;
        gap: 28px;
        align-items: flex-start;
        justify-content: center;
        padding: 28px 16px 80px;
        min-height: 100vh;
      }
      /* On a phone the two columns wrap; let the controls sit under the phone
         and stop being sticky so they don't cover the widgets. */
      @media (max-width: 740px) {
        body { padding: 16px 12px 60px; gap: 18px; }
        .controls { position: static; width: 100%; max-width: 412px; }
      }

      /* ── Phone / dashboard mock ─────────────────────────────────────────── */
      .phone {
        width: 412px;
        flex: none;
        background: #0f1419;
        border: 1px solid #20272f;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
      }
      .homey-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px 18px 12px;
        background: #0f1419;
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .homey-bar__title { font-size: 20px; font-weight: 700; flex: 1 1 auto; }
      .homey-bar__chev { color: #97a2ab; font-size: 14px; }
      .homey-bar__btn {
        width: 30px; height: 30px; border-radius: 999px;
        background: #232b33; color: #edf1f4;
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 15px;
      }
      .dash { display: flex; flex-direction: column; gap: 22px; padding: 4px 14px 20px; }
      .widget { display: flex; flex-direction: column; gap: 8px; }
      .widget__title { margin: 0; font-size: 18px; font-weight: 700; color: #edf1f4; }
      /* No padding here: Homey's widget-padding class (.homey-widget-small etc.,
         injected into each iframe) provides the real content inset, so the tile
         is flush like the dashboard card. */
      .tile {
        background: #161b21;
        border-radius: 14px;
        overflow: hidden;
      }
      .tile__frame { width: 100%; border: 0; display: block; background: transparent; }

      /* ── Controls ───────────────────────────────────────────────────────── */
      .controls {
        width: 280px;
        flex: none;
        position: sticky;
        top: 28px;
        background: #12161c;
        border: 1px solid #20272f;
        border-radius: 16px;
        padding: 18px;
      }
      .controls h1 { font-size: 15px; margin: 0 0 4px; }
      .controls p { font-size: 12px; color: #97a2ab; margin: 0 0 16px; line-height: 1.4; }
      .ctrl { margin-bottom: 14px; }
      .ctrl__label { display: block; font-size: 12px; color: #97a2ab; margin-bottom: 5px; }
      .ctrl select {
        width: 100%;
        background: #1c232b;
        color: #edf1f4;
        border: 1px solid #2a333d;
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
        font-size: 13px;
      }
      .controls__row { display: flex; gap: 8px; margin-top: 8px; }
      .controls button {
        flex: 1 1 auto;
        background: #1c232b;
        color: #edf1f4;
        border: 1px solid #2a333d;
        border-radius: 8px;
        padding: 9px 10px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }
      .controls button:hover { background: #232c35; }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="homey-bar">
        <span class="homey-bar__title">All the pels widgets</span>
        <span class="homey-bar__chev">▾</span>
        <span class="homey-bar__btn">✏</span>
        <span class="homey-bar__btn">✕</span>
      </div>
      <div class="dash" data-dash></div>
    </div>

    <aside class="controls">
      <h1>Widget harness</h1>
      <p>Each widget runs its real data path against mocked endpoints. Change a
        scenario to re-drive that widget; the data lives in <code>mockData.mjs</code>.</p>
      <div data-controls></div>
      <div class="controls__row">
        <button data-reload-all>Reload all</button>
        <button data-theme-toggle>Theme: dark</button>
      </div>
    </aside>

    <script type="module" src="./harness.mjs"></script>
  </body>
</html>
