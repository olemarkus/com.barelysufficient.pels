<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" role="img">
  <title>Homey routine to PELS mode handoff</title>
  <desc>Presence, time, buttons, or calendar events trigger a Homey Flow, which sets the PELS mode. PELS applies targets and priorities for Home, Away, or Night.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#126c33" />
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #b9d8c4; stroke-width: 2; }
      .accent { fill: #e8f7ee; stroke: #22c55e; stroke-width: 2; }
      .line { stroke: #126c33; stroke-width: 3; marker-end: url(#arrow); }
      .label { fill: #181818; font: 600 20px IBM Plex Sans, Segoe UI, sans-serif; }
      .small { fill: #4f5b54; font: 400 16px IBM Plex Sans, Segoe UI, sans-serif; }
    </style>
  </defs>

  <rect width="720" height="410" rx="18" fill="#f6f7fb" />

  <rect class="panel" x="92" y="28" width="536" height="66" rx="14" />
  <text class="label" x="360" y="58" text-anchor="middle">Presence / time / button / calendar</text>
  <text class="small" x="360" y="80" text-anchor="middle">Homey decides when the routine changes</text>

  <line class="line" x1="360" y1="96" x2="360" y2="136" />

  <rect class="panel" x="255" y="138" width="210" height="62" rx="14" />
  <text class="label" x="360" y="176" text-anchor="middle">Homey Flow</text>

  <line class="line" x1="360" y1="202" x2="360" y2="242" />

  <rect class="accent" x="248" y="244" width="224" height="64" rx="14" />
  <text class="label" x="360" y="282" text-anchor="middle">Set PELS mode</text>

  <line class="line" x1="360" y1="310" x2="360" y2="348" />

  <rect class="panel" x="78" y="350" width="564" height="42" rx="14" />
  <text class="small" x="360" y="376" text-anchor="middle">PELS applies targets + priorities for Home, Away or Night</text>
</svg>
