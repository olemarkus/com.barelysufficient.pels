<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Budget and Price</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./index.css">
  </head>
  <body class="homey-widget-full">
    <main id="widget-root" class="homey-widget widget-root">
      <div id="summary" class="summary" data-summary aria-live="polite">
        <span class="summary__headline" data-summary-headline></span>
        <span class="summary__status" data-summary-status hidden></span>
      </div>
      <div
        id="tabs"
        class="tabs"
        role="tablist"
        aria-label="Time of day"
        data-tabs
        hidden
      >
        <button
          type="button"
          class="tab"
          role="tab"
          data-tab="morning"
          aria-controls="chart"
          aria-selected="true"
        ></button>
        <button
          type="button"
          class="tab"
          role="tab"
          data-tab="afternoon"
          aria-controls="chart"
          aria-selected="false"
        ></button>
      </div>
      <svg
        id="chart"
        class="chart"
        viewBox="0 0 480 360"
        preserveAspectRatio="none"
        role="img"
        aria-label="Budget and price chart"
      ></svg>
    </main>

    <script src="./index.js"></script>
  </body>
</html>
