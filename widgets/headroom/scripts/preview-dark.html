<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Headroom widget preview (dark)</title>
    <style>
      html, body { margin: 0; padding: 0; background: transparent; width: 1024px; height: 1024px; }
    </style>
  </head>
  <body>
    <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="160%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
          <feOffset dx="0" dy="22" result="offsetblur"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
          <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <linearGradient id="chip-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#8fd9a0"/>
          <stop offset="1" stop-color="#58c56a"/>
        </linearGradient>
        <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#3fbf57"/>
          <stop offset="1" stop-color="#2ea84a"/>
        </linearGradient>
      </defs>

      <g filter="url(#card-shadow)">
        <rect x="100" y="200" width="824" height="720" rx="44" ry="44" fill="#22282F"/>
      </g>

      <rect x="170" y="330" width="490" height="56" rx="28" ry="28" fill="#3A4148"/>
      <rect x="170" y="416" width="340" height="56" rx="28" ry="28" fill="#3A4148"/>

      <rect x="730" y="335" width="160" height="84" rx="42" ry="42" fill="url(#chip-grad)"/>

      <rect x="170" y="610" width="690" height="62" rx="31" ry="31" fill="#3A4148"/>
      <rect x="170" y="610" width="497" height="62" rx="31" ry="31" fill="url(#bar-grad)"/>

      <rect x="170" y="818" width="330" height="44" rx="22" ry="22" fill="#3A4148"/>
    </svg>
  </body>
</html>
