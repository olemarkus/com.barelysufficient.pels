<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Held-back devices widget preview (light)</title>
    <style>
      html, body { margin: 0; padding: 0; background: transparent; width: 1024px; height: 1024px; }
    </style>
  </head>
  <body>
    <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="160%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
          <feOffset dx="0" dy="22" result="offsetblur"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
          <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <g filter="url(#card-shadow)">
        <rect x="100" y="200" width="824" height="720" rx="44" ry="44" fill="#FFFFFF"/>
      </g>

      <!-- Budget-starved row (danger tone, offers a rescue) -->
      <rect x="150" y="260" width="724" height="200" rx="20" ry="20" fill="#fdeceb"/>
      <rect x="150" y="260" width="8" height="200" rx="4" ry="4" fill="#f0696c"/>
      <!-- name -->
      <rect x="190" y="290" width="200" height="28" rx="14" ry="14" fill="#9aa3ab"/>
      <!-- "Starved · 42 min" chip -->
      <rect x="640" y="292" width="200" height="24" rx="12" ry="12" fill="#f0696c"/>
      <!-- "Held by daily budget" subtext -->
      <rect x="190" y="338" width="300" height="22" rx="11" ry="11" fill="#c4ccd3"/>
      <!-- Rescue button (Let it run now) -->
      <rect x="190" y="384" width="260" height="56" rx="16" ry="16" fill="#58c56a"/>

      <!-- Capacity-starved row (warn tone, informational only) -->
      <rect x="150" y="492" width="724" height="150" rx="20" ry="20" fill="#fef6e8"/>
      <rect x="150" y="492" width="8" height="150" rx="4" ry="4" fill="#f5a623"/>
      <rect x="190" y="522" width="180" height="28" rx="14" ry="14" fill="#9aa3ab"/>
      <rect x="640" y="524" width="200" height="24" rx="12" ry="12" fill="#b9770e"/>
      <rect x="190" y="570" width="220" height="22" rx="11" ry="11" fill="#c4ccd3"/>
      <!-- muted "Waiting for power to free up." note -->
      <rect x="190" y="604" width="320" height="20" rx="10" ry="10" fill="#e8ebee"/>
    </svg>
  </body>
</html>
