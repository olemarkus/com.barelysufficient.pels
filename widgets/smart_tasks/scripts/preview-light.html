<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Smart tasks widget preview (light)</title>
    <style>
      html, body { margin: 0; padding: 0; background: transparent; width: 1024px; height: 1024px; }
    </style>
  </head>
  <body>
    <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="160%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
          <feOffset dx="0" dy="22" result="offsetblur"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
          <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Card -->
      <g filter="url(#card-shadow)">
        <rect x="100" y="200" width="824" height="720" rx="44" ry="44" fill="#ffffff"/>
      </g>

      <!-- Row 1 (danger) -->
      <rect x="135" y="270" width="754" height="150" rx="32" ry="32" fill="#fde2e3"/>
      <rect x="170" y="320" width="240" height="50" rx="25" ry="25" fill="#9aa0a6"/>
      <rect x="450" y="320" width="180" height="50" rx="25" ry="25" fill="#bdc1c6"/>
      <rect x="660" y="320" width="100" height="50" rx="25" ry="25" fill="#bdc1c6"/>
      <rect x="780" y="325" width="100" height="42" rx="21" ry="21" fill="#f0696c"/>

      <!-- Row 2 (warn) -->
      <rect x="135" y="445" width="754" height="150" rx="32" ry="32" fill="#fdebd3"/>
      <rect x="170" y="495" width="240" height="50" rx="25" ry="25" fill="#9aa0a6"/>
      <rect x="450" y="495" width="180" height="50" rx="25" ry="25" fill="#bdc1c6"/>
      <rect x="660" y="495" width="100" height="50" rx="25" ry="25" fill="#bdc1c6"/>
      <rect x="780" y="500" width="100" height="42" rx="21" ry="21" fill="#f5a623"/>

      <!-- Row 3 (ok) -->
      <rect x="135" y="620" width="754" height="150" rx="32" ry="32" fill="transparent"/>
      <rect x="170" y="670" width="240" height="50" rx="25" ry="25" fill="#9aa0a6"/>
      <rect x="450" y="670" width="180" height="50" rx="25" ry="25" fill="#bdc1c6"/>
      <rect x="660" y="670" width="100" height="50" rx="25" ry="25" fill="#bdc1c6"/>
      <rect x="780" y="675" width="100" height="42" rx="21" ry="21" fill="#58c56a"/>
    </svg>
  </body>
</html>
