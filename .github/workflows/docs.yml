name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      live_ref:
        description: "Override production docs ref"
        required: false
        type: string
      test_ref:
        description: "Override test docs ref"
        required: false
        type: string
      dev_ref:
        description: "Override dev docs ref"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Build docs channels
        run: npm run docs:build:channels
        env:
          PELS_DOCS_LIVE_REF: ${{ github.event.inputs.live_ref || vars.PELS_DOCS_LIVE_REF }}
          PELS_DOCS_TEST_REF: ${{ github.event.inputs.test_ref || vars.PELS_DOCS_TEST_REF }}
          PELS_DOCS_DEV_REF: ${{ github.event.inputs.dev_ref || vars.PELS_DOCS_DEV_REF }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
