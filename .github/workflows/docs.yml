name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      live_ref:
        description: "Override production docs ref"
        required: false
        type: string
      test_ref:
        description: "Override test docs ref"
        required: false
        type: string
      dev_ref:
        description: "Override dev docs ref"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js 22.22.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Pin npm 10.9.4
        run: npm install --global npm@10.9.4

      - name: Install dependencies
        run: npm ci

      - name: Build docs channels
        run: npm run docs:build:channels
        env:
          PELS_DOCS_LIVE_REF: ${{ github.event.inputs.live_ref || vars.PELS_DOCS_LIVE_REF }}
          PELS_DOCS_TEST_REF: ${{ github.event.inputs.test_ref || vars.PELS_DOCS_TEST_REF }}
          PELS_DOCS_DEV_REF: ${{ github.event.inputs.dev_ref || vars.PELS_DOCS_DEV_REF }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
