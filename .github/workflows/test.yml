name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Install Homey CLI
        run: npm install --global homey@3.12.2

      - name: Run lint, typecheck, and static checks
        run: npm run ci:checks

      - name: Enforce lib/plan -> objectives type-edge boundary
        run: npm run arch:grep

      - name: Build app bundle
        run: npm run build

      - name: Verify committed generated artifacts match source
        run: |
          DIRTY="$(git status --porcelain)"
          if [ -n "$DIRTY" ]; then
            echo "::error::Build changed the working tree. A generated artifact (e.g. a widget bundle) is stale, hand-edited, or newly produced but uncommitted. Run 'npm run build' and commit the result." >&2
            echo "$DIRTY" >&2
            exit 1
          fi

      - name: Validate Homey package contents
        run: npm run validate

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Build docs site
        run: npm run docs:build

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Run unit lane
        run: npm run test:unit

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Run integration lane
        run: npm run test:integration

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Run runtime e2e lane
        run: npm run test:e2e:runtime

  timezone-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Run timezone regression lane
        run: npm run test:unit:tz

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Run all runtime tiers with coverage (80% gate)
        run: npm run test:coverage

  settings-ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HOME: /root
    # Keep the Playwright image tag in sync with @playwright/test in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
      options: --ipc=host

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Run settings UI Jest suites
        run: npm run ci:test:settings-ui

  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HOME: /root
    strategy:
      fail-fast: false
      matrix:
        project: [chromium-mobile-width, firefox-mobile-width, chromium-narrow-width]
    # Keep the Playwright image tag in sync with @playwright/test in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
      options: --ipc=host

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup toolchain and dependencies
        uses: ./.github/actions/setup

      - name: Build settings UI once for Playwright
        run: npm --workspace @pels/settings-ui run build

      - name: Run Playwright E2E (${{ matrix.project }})
        env:
          PELS_E2E_BUILD: '0'
        run: npm --workspace @pels/settings-ui run test:e2e -- --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            packages/settings-ui/playwright-report
            packages/settings-ui/test-results
          retention-days: 7
