name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22.22.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Pin npm 10.9.4
        run: npm install --global npm@10.9.4

      - name: Install Homey CLI
        run: npm install --global homey@3.12.2

      - name: Install dependencies
        run: npm ci

      - name: Run build, lint, and static checks
        run: npm run ci:checks

  runtime-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22.22.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Pin npm 10.9.4
        run: npm install --global npm@10.9.4

      - name: Install dependencies
        run: npm ci

      - name: Run runtime Jest suites
        run: npm run ci:test:runtime

  settings-ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22.22.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Pin npm 10.9.4
        run: npm install --global npm@10.9.4

      - name: Install dependencies
        run: npm ci

      - name: Run settings UI Jest suites
        run: npm run ci:test:settings-ui

  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HOME: /root
    strategy:
      fail-fast: false
      matrix:
        project: [chromium-mobile-width, firefox-mobile-width]
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --ipc=host

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22.22.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Pin npm 10.9.4
        run: npm install --global npm@10.9.4

      - name: Install dependencies
        run: npm ci

      - name: Build settings UI once for Playwright
        run: npm --workspace @pels/settings-ui run build

      - name: Run Playwright E2E (${{ matrix.project }})
        env:
          PELS_E2E_BUILD: '0'
        run: npm --workspace @pels/settings-ui run test:e2e -- --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            packages/settings-ui/playwright-report
            packages/settings-ui/test-results
          retention-days: 7
